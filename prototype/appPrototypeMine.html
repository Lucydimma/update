<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lendsqr - Users</title>
   <link rel="stylesheet" href="appPrototype2.css">
</head>

<body>
    <div class="wrapper">
        <!-- nav bar -->
        <div class="navbar">
            <div class="sidebar-section">
                <img src="Borrower nav (1).png" alt="navigator-bar">
            </div>


            <!-- top nav/search bar -->
            <div class="topnav">
                <img src="top-nav.png" alt="">

                <!-- user -->
                <div class="user">
                    <img src="Users.png" alt="">

                    <!-- Statistic Cards -->
                    <div class="stats-grid">
                        <img src="first.png" alt="">
                    </div>

                    <div class="stat-card">
                        <img src="second.png" alt="">
                    </div>

                    <div class="stat-card">
                        <img src="third.png" alt="">
                    </div>

                    <div class="stat-card">
                        <img src="fourth.png" alt="">
                    </div>
                </div>

                <!-- Users Table -->
                <div class="table">
                    <img src="table.png" alt="">


                    <!-- Pagination -->
                    <div class="pagination">
                        <img src="pagination.png" alt="">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
